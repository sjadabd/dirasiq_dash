<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mulhim IQ — Post Template 1080×1350</title>
  <!--
    ============================================================
    MULHIM IQ — FIXED SOCIAL POST TEMPLATE (1080 × 1350)
    ============================================================
    How to reuse for every post:
      1. Edit the POST CONFIG object below (title, features, screenshot).
      2. Open this file in Chrome at 100% zoom.
      3. Export: DevTools → … → Capture node screenshot on #canvas
         OR use any 1080×1350 export tool / Canva import.

    Only change: title · screenshot · features
    Do NOT change layout, colors, margins, or footer.
    ============================================================
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-deep: #0F2C5C;
      --navy: #1F4D8F;
      --navy-mid: #163E72;
      --orange: #F5A623;
      --orange-deep: #F57C22;
      --accent-line: #CBDDF1;
      --white: #FFFFFF;
      --ink: #111827;
      --ink-soft: #6B7280;
      --margin: 40px;
      --radius-card: 20px;
      --font: "IBM Plex Sans Arabic", "Cairo", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1a1a1a;
      font-family: var(--font);
      padding: 24px;
      direction: rtl;
    }

    /* Exact export canvas */
    #canvas {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 50% at 15% 10%, rgba(245, 166, 35, 0.14), transparent 55%),
        radial-gradient(ellipse 70% 55% at 90% 85%, rgba(61, 140, 220, 0.22), transparent 50%),
        linear-gradient(160deg, #0B1A30 0%, var(--navy-deep) 42%, var(--navy-mid) 78%, #0F2C5C 100%);
      color: var(--white);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    /* Subtle geometric depth — non-distracting */
    .geo {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      border: 1px solid rgba(203, 221, 241, 0.12);
    }
    .geo-a {
      width: 420px; height: 420px;
      top: -120px; left: -100px;
      background: radial-gradient(circle, rgba(31, 77, 143, 0.35), transparent 70%);
    }
    .geo-b {
      width: 280px; height: 280px;
      bottom: 180px; right: -80px;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.12), transparent 70%);
    }
    .geo-c {
      width: 160px; height: 160px;
      top: 38%; left: 6%;
      border-color: rgba(245, 166, 35, 0.18);
      background: transparent;
    }
    .geo-d {
      width: 90px; height: 90px;
      top: 22%; right: 8%;
      border-color: rgba(203, 221, 241, 0.2);
    }

    .inner {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: var(--margin);
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      padding: 6px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .brand-text strong {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-text span {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
      margin-top: 4px;
    }

    .title-block {
      flex: 1;
      text-align: right;
      max-width: 720px;
    }

    .title-block h1 {
      font-family: "Cairo", var(--font);
      font-size: 48px;
      font-weight: 800;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: #fff;
    }

    .title-underline {
      width: 88px;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--orange-deep), var(--orange));
      margin-top: 16px;
      margin-inline-start: auto;
    }

    /* ---- Stage (screenshot + feature chips) ---- */
    .stage {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .screenshot-card {
      width: 720px;
      height: 780px;
      background: var(--white);
      border-radius: var(--radius-card);
      border: 2px solid var(--accent-line);
      box-shadow:
        0 4px 6px rgba(15, 44, 92, 0.06),
        0 24px 48px rgba(15, 44, 92, 0.28);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .screenshot-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* Placeholder UI when no screenshot is provided */
    .shot-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #F8F9FB 0%, #EEF2F7 100%);
      display: grid;
      grid-template-columns: 72px 1fr;
      direction: rtl;
    }

    .shot-placeholder .side {
      background: var(--navy-deep);
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .shot-placeholder .dot {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.15);
    }

    .shot-placeholder .dot.active {
      background: var(--orange);
    }

    .shot-placeholder .main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .shot-placeholder .bar {
      height: 36px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #EEF2F7;
      box-shadow: 0 1px 2px rgba(15, 44, 92, 0.05);
    }

    .shot-placeholder .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
    }

    .shot-placeholder .tile {
      background: #fff;
      border: 1px solid #EEF2F7;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .shot-placeholder .tile .line {
      height: 10px;
      border-radius: 6px;
      background: #E9EEF5;
    }

    .shot-placeholder .tile .line.short { width: 55%; }
    .shot-placeholder .tile .thumb {
      height: 72px;
      border-radius: 10px;
      background: linear-gradient(135deg, #E9F0F9, #CBDDF1);
    }

    /* Feature chips around screenshot */
    .feature {
      position: absolute;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      border: 1px solid rgba(203, 221, 241, 0.9);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 12px 28px rgba(15, 44, 92, 0.22);
      max-width: 260px;
      backdrop-filter: blur(8px);
    }

    .feature .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 18px;
      color: #fff;
    }

    .feature .icon.blue { background: linear-gradient(145deg, var(--navy), var(--navy-deep)); }
    .feature .icon.orange { background: linear-gradient(145deg, var(--orange), var(--orange-deep)); }
    .feature .icon.teal { background: linear-gradient(145deg, #1FA971, #178A5B); }
    .feature .icon.sky { background: linear-gradient(145deg, #3FA9F5, #1F4D8F); }

    .feature strong {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      display: block;
    }

    .feature span {
      font-size: 12px;
      color: var(--ink-soft);
      font-weight: 500;
      display: block;
      margin-top: 2px;
    }

    .feature-1 { top: 6%; right: -8px; }
    .feature-2 { top: 38%; left: -18px; }
    .feature-3 { bottom: 18%; right: -12px; }
    .feature-4 { bottom: 4%; left: 8px; }

    /* ---- Footer ---- */
    .footer {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(203, 221, 241, 0.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .footer-site {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.92);
    }

    .footer-site .globe {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(245, 166, 35, 0.18);
      border: 1px solid rgba(245, 166, 35, 0.45);
      display: grid;
      place-items: center;
      font-size: 14px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.92;
    }

    .footer-brand img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px;
    }

    .footer-brand span {
      font-size: 18px;
      font-weight: 700;
    }

    /* Toolbar outside canvas — not in export */
    .toolbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      z-index: 50;
      display: flex;
      gap: 12px;
      align-items: center;
      font-family: system-ui, sans-serif;
      direction: ltr;
    }

    .toolbar button {
      background: var(--orange);
      color: #0F2C5C;
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    @media print {
      body { background: none; padding: 0; }
      .toolbar { display: none !important; }
      #canvas { box-shadow: none; }
    }
  </style>
</head>
<body>
  <!-- ===================== EDITABLE POST CONFIG ===================== -->
  <script>
    /**
     * غيّر هذه القيم فقط لكل منشور جديد
     */
    window.MULHIM_POST = {
      title: "انضم إلى أساتذة Mulhim IQ",
      // ضع مسار لقطة الشاشة الحقيقية هنا، أو اتركه فارغًا لعرض Placeholder
      // مثال: screenshot: "./screenshots/teacher-dashboard.png",
      screenshot: "",
      features: [
        { icon: "🛡️", tone: "orange", title: "فيديوهات محمية", subtitle: "حماية متقدمة لمحتواك" },
        { icon: "📚", tone: "blue",   title: "إدارة الدورات",   subtitle: "طلاب · جداول · حضور" },
        { icon: "📝", tone: "teal",   title: "واجبات وامتحانات", subtitle: "متابعة وتقييم بسهولة" },
        { icon: "💳", tone: "sky",    title: "فواتير وتحصيل",   subtitle: "مدفوعات منظمة" },
      ],
    };
  </script>
  <!-- ================================================================ -->

  <div id="canvas" aria-label="Mulhim IQ post template 1080x1350">
    <div class="geo geo-a"></div>
    <div class="geo geo-b"></div>
    <div class="geo geo-c"></div>
    <div class="geo geo-d"></div>

    <div class="inner">
      <header class="header">
        <div class="title-block">
          <h1 id="post-title">عنوان المنشور</h1>
          <div class="title-underline" aria-hidden="true"></div>
        </div>
        <div class="brand" title="Mulhim IQ">
          <!-- Logo top-left in LTR terms = visually start side; with RTL flex this sits on the left of header row end -->
          <div class="brand-text">
            <strong>Mulhim IQ</strong>
            <span>منصة التعليم الذكية</span>
          </div>
          <img src="./logo.png" alt="Mulhim IQ" />
        </div>
      </header>

      <section class="stage">
        <article class="feature feature-1" data-feature="0"></article>
        <article class="feature feature-2" data-feature="1"></article>
        <article class="feature feature-3" data-feature="2"></article>
        <article class="feature feature-4" data-feature="3"></article>

        <div class="screenshot-card" id="screenshot-card">
          <div class="shot-placeholder" id="shot-placeholder">
            <div class="side">
              <div class="dot active"></div>
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
            <div class="main">
              <div class="bar"></div>
              <div class="grid">
                <div class="tile"><div class="thumb"></div><div class="line"></div><div class="line short"></div></div>
                <div class="tile"><div class="thumb"></div><div class="line"></div><div class="line short"></div></div>
                <div class="tile"><div class="thumb"></div><div class="line"></div><div class="line short"></div></div>
                <div class="tile"><div class="thumb"></div><div class="line"></div><div class="line short"></div></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <div class="footer-site">
          <span class="globe" aria-hidden="true">🌐</span>
          <span>mulhimiq.com</span>
        </div>
        <div class="footer-brand">
          <span>Mulhim IQ</span>
          <img src="./logo.png" alt="" />
        </div>
      </footer>
    </div>
  </div>

  <div class="toolbar">
    <span>1080 × 1350 · Mulhim IQ template</span>
    <button type="button" id="btn-print">Print / Save PDF</button>
  </div>

  <script>
    (function renderPost() {
      const cfg = window.MULHIM_POST || {};
      const titleEl = document.getElementById("post-title");
      if (titleEl) titleEl.textContent = cfg.title || "عنوان المنشور";

      const features = Array.isArray(cfg.features) ? cfg.features : [];
      document.querySelectorAll("[data-feature]").forEach(node => {
        const idx = Number(node.getAttribute("data-feature"));
        const item = features[idx];
        if (!item) {
          node.style.display = "none";
          return;
        }
        node.innerHTML =
          '<div class="icon ' + (item.tone || "blue") + '">' + (item.icon || "✦") + "</div>" +
          "<div><strong>" + (item.title || "") + "</strong>" +
          (item.subtitle ? "<span>" + item.subtitle + "</span>" : "") +
          "</div>";
      });

      const shot = (cfg.screenshot || "").trim();
      const card = document.getElementById("screenshot-card");
      const placeholder = document.getElementById("shot-placeholder");
      if (shot && card && placeholder) {
        const img = document.createElement("img");
        img.src = shot;
        img.alt = "لقطة من منصة Mulhim IQ";
        img.onload = () => {
          placeholder.remove();
          card.appendChild(img);
        };
        img.onerror = () => {
          // keep placeholder if screenshot path is invalid
        };
      }

      document.getElementById("btn-print")?.addEventListener("click", () => window.print());
    })();
  </script>
</body>
</html>
